spring:
  application:
    name: tenant-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/kaori_tenant}
    username: ${DB_USER:kaori}
    password: ${DB_PASS:kaori}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: tenant
server:
  port: ${PORT:8082}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
