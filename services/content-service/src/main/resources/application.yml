spring:
  application:
    name: content-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/kaori_content}
    username: ${DB_USER:kaori}
    password: ${DB_PASS:kaori}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: content

server:
  port: ${PORT:8088}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    vn.kaori.spa: DEBUG
  pattern:
    # MDC fields (tenantId, userId, traceId, requestId) populated by MdcFilter + JwtAuthFilter.
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [tenantId=%X{tenantId:-} userId=%X{userId:-} traceId=%X{traceId:-} reqId=%X{requestId:-} %X{method:-} %X{path:-}] - %msg%n'
