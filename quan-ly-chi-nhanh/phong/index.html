<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Quản Lý Phòng & Giường</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            ivory: '#FAF9F6', cream: '#F4EFEA', gold: '#C9A87C',
                            goldhover: '#B5956A', rose: '#D9B8B5', lavender: '#DCD6DD',
                            textmain: '#4A443E', textmuted: '#8B837C'
                        }
                    },
                    fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Jost', 'sans-serif'] },
                    boxShadow: { 'soft': '0 10px 40px -10px rgba(74,68,62,0.08)' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #FAF9F6; }
        ::-webkit-scrollbar-thumb { background: #D9B8B5; border-radius: 10px; }

        .room-card { transition: all 0.25s ease; }
        .room-card:hover { transform: translateY(-3px); }

        /* Status border colors */
        .room-available   { border-color: #bbf7d0; }
        .room-occupied    { border-color: #fecaca; }
        .room-cleaning    { border-color: #fde68a; }
        .room-maintenance { border-color: #e5e7eb; }

        /* Bed cell styles */
        .bed-cell { width: 44px; height: 54px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent; gap: 2px; position: relative; }
        .bed-cell:hover { transform: scale(1.08); }
        .bed-available   { background: #f0fdf4; border-color: #86efac; color: #16a34a; }
        .bed-occupied    { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
        .bed-cleaning    { background: #fefce8; border-color: #fde047; color: #ca8a04; }
        .bed-maintenance { background: #f9fafb; border-color: #d1d5db; color: #6b7280; }
        .bed-cell .bed-icon { font-size: 18px; line-height: 1; }

        .badge-available  { background: #dcfce7; color: #16a34a; }
        .badge-occupied   { background: #fee2e2; color: #dc2626; }
        .badge-cleaning   { background: #fef9c3; color: #ca8a04; }
        .badge-maintenance{ background: #f3f4f6; color: #6b7280; }

        /* Modal */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 50; display: none; align-items: center; justify-content: center; }
        .modal-backdrop.open { display: flex; }
    </style>
</head>
<body class="bg-brand-ivory text-brand-textmain font-sans h-screen flex overflow-hidden">

    <!-- Sidebar inject point -->
    <div id="sidebar-root"></div>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-brand-cream px-8 py-4 flex items-center justify-between z-20 flex-shrink-0">
        <div class="flex items-center gap-4">
            <i data-lucide="door-open" class="text-brand-gold w-5 h-5" stroke-width="1.5"></i>
            <h1 class="font-serif text-xl">Quản Lý Phòng & Giường</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex items-center bg-brand-ivory rounded-full px-4 py-2 border border-brand-cream w-60">
                <i data-lucide="search" class="w-4 h-4 text-brand-textmuted mr-2"></i>
                <input type="text" placeholder="Tìm phòng..." class="bg-transparent outline-none text-sm w-full placeholder-brand-textmuted" oninput="applyFilters()">
            </div>
            <a href="lich-phong.html" class="border border-brand-gold text-brand-gold px-5 py-2.5 rounded-full text-sm font-medium hover:bg-brand-gold hover:text-white transition flex items-center gap-2">
                <i data-lucide="calendar-range" class="w-4 h-4"></i> Lịch Phòng
            </a>
            <a href="them-phong.html" class="bg-brand-gold hover:bg-brand-goldhover text-white px-5 py-2.5 rounded-full text-sm font-medium transition shadow flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> Thêm Phòng
            </a>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto">
    <div class="max-w-screen-2xl mx-auto p-8">

        <!-- Stats Bar -->
        <div class="grid grid-cols-6 gap-4 mb-8">
            <div class="bg-white p-4 rounded-2xl shadow-soft border border-brand-cream/50 text-center">
                <p class="text-xs text-brand-textmuted uppercase tracking-wide mb-1">Tổng Phòng</p>
                <p class="font-serif text-2xl" id="stat-total">8</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-soft border border-brand-cream/50 text-center">
                <p class="text-xs text-green-600 uppercase tracking-wide mb-1">Phòng Trống</p>
                <p class="font-serif text-2xl text-green-600" id="stat-rooms-free">3</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-soft border border-brand-cream/50 text-center">
                <p class="text-xs text-red-500 uppercase tracking-wide mb-1">Đang Dùng</p>
                <p class="font-serif text-2xl text-red-500" id="stat-rooms-occ">4</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-soft border border-brand-cream/50 text-center">
                <p class="text-xs text-brand-textmuted uppercase tracking-wide mb-1">Tổng Giường</p>
                <p class="font-serif text-2xl" id="stat-beds-total">18</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-soft border border-brand-cream/50 text-center">
                <p class="text-xs text-green-600 uppercase tracking-wide mb-1">Giường Trống</p>
                <p class="font-serif text-2xl text-green-600" id="stat-beds-free">9</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-soft border border-brand-cream/50 text-center">
                <p class="text-xs text-red-500 uppercase tracking-wide mb-1">Giường Có Khách</p>
                <p class="font-serif text-2xl text-red-500" id="stat-beds-occ">9</p>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="flex items-center gap-3 mb-6 flex-wrap">
            <span class="text-sm text-brand-textmuted font-medium">Lọc:</span>
            <div class="flex gap-2">
                <button onclick="setFilter('all')" data-f="all" class="filter-btn px-4 py-1.5 rounded-full text-sm border border-brand-gold bg-brand-gold/10 text-brand-gold">Tất cả</button>
                <button onclick="setFilter('available')" data-f="available" class="filter-btn px-4 py-1.5 rounded-full text-sm border border-brand-cream text-brand-textmuted hover:border-brand-gold hover:text-brand-gold transition">Còn trống</button>
                <button onclick="setFilter('occupied')" data-f="occupied" class="filter-btn px-4 py-1.5 rounded-full text-sm border border-brand-cream text-brand-textmuted hover:border-brand-gold hover:text-brand-gold transition">Đang dùng</button>
                <button onclick="setFilter('cleaning')" data-f="cleaning" class="filter-btn px-4 py-1.5 rounded-full text-sm border border-brand-cream text-brand-textmuted hover:border-brand-gold hover:text-brand-gold transition">Đang dọn</button>
            </div>
            <div class="flex items-center gap-2 ml-auto">
                <select class="text-sm border border-brand-cream rounded-xl px-3 py-1.5 bg-white text-brand-textmuted outline-none" onchange="applyFilters()">
                    <option value="all">Tất cả giới tính</option>
                    <option value="female">Nữ</option>
                    <option value="male">Nam</option>
                    <option value="unisex">Nam/Nữ</option>
                </select>
            </div>
        </div>

        <!-- Room Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6" id="room-grid">
        </div>
    </div>

    <!-- Bed Detail Modal -->
    <div class="modal-backdrop" id="bed-modal">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md mx-4 overflow-hidden">
            <div class="flex items-center justify-between p-6 border-b border-brand-cream">
                <h2 class="font-serif text-xl" id="bed-modal-title">Chi Tiết Giường</h2>
                <button onclick="closeBedModal()" class="p-2 rounded-full hover:bg-brand-cream transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6" id="bed-modal-body"></div>
            <div class="p-6 border-t border-brand-cream flex gap-3">
                <button onclick="changeBedStatus()" class="flex-1 bg-brand-gold text-white py-2.5 rounded-xl text-sm font-medium hover:bg-brand-goldhover transition" id="bed-action-btn">
                    Đổi Trạng Thái
                </button>
                <button onclick="closeBedModal()" class="flex-1 border border-brand-cream text-brand-textmuted py-2.5 rounded-xl text-sm hover:border-brand-gold hover:text-brand-gold transition">
                    Đóng
                </button>
            </div>
        </div>
    </div>

    <!-- Room Config Modal -->
    <div class="modal-backdrop" id="room-config-modal">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl mx-4 overflow-hidden max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between p-6 border-b border-brand-cream flex-shrink-0">
                <h2 class="font-serif text-xl" id="room-config-title">Cấu Hình Phòng</h2>
                <button onclick="closeRoomModal()" class="p-2 rounded-full hover:bg-brand-cream transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1" id="room-config-body"></div>
            <div class="p-6 border-t border-brand-cream flex gap-3 flex-shrink-0">
                <button class="flex-1 bg-brand-gold text-white py-2.5 rounded-xl text-sm font-medium hover:bg-brand-goldhover transition" onclick="saveRoomConfig()">
                    Lưu Thay Đổi
                </button>
                <button onclick="closeRoomModal()" class="flex-1 border border-brand-cream text-brand-textmuted py-2.5 rounded-xl text-sm hover:border-brand-gold hover:text-brand-gold transition">
                    Hủy
                </button>
            </div>
        </div>
    </div>

    <script>
    lucide.createIcons();

    // ─── DATA MODEL ───────────────────────────────────────────────
    const rooms = [
        {
            id: 'R01', name: 'Phòng 01', floor: 1, type: 'Standard',
            gender: 'female', services: ['Massage', 'Body Wrap'],
            status: 'occupied',
            beds: [
                { id: 'R01-B1', name: 'Giường A', type: 'standard', status: 'occupied', customer: 'Nguyễn Thị Hoa', service: 'Deep Tissue', until: '11:30' },
                { id: 'R01-B2', name: 'Giường B', type: 'standard', status: 'available', customer: null }
            ]
        },
        {
            id: 'R02', name: 'Phòng 02', floor: 1, type: 'Deluxe',
            gender: 'female', services: ['Facial', 'Massage'],
            status: 'available',
            beds: [
                { id: 'R02-B1', name: 'Giường A', type: 'deluxe', status: 'available', customer: null },
                { id: 'R02-B2', name: 'Giường B', type: 'deluxe', status: 'available', customer: null }
            ]
        },
        {
            id: 'R03', name: 'Phòng 03', floor: 1, type: 'Standard',
            gender: 'female', services: ['Massage'],
            status: 'occupied',
            beds: [
                { id: 'R03-B1', name: 'Giường A', type: 'standard', status: 'occupied', customer: 'Trần Thị Lan', service: 'Swedish', until: '12:00' }
            ]
        },
        {
            id: 'R04', name: 'Phòng 04', floor: 2, type: 'Standard',
            gender: 'male', services: ['Massage', 'Body Scrub'],
            status: 'occupied',
            beds: [
                { id: 'R04-B1', name: 'Giường A', type: 'standard', status: 'occupied', customer: 'Trần Văn Nam', service: 'HydraFacial', until: '12:00' },
                { id: 'R04-B2', name: 'Giường B', type: 'standard', status: 'available', customer: null }
            ]
        },
        {
            id: 'R05', name: 'Phòng 05', floor: 2, type: 'VIP',
            gender: 'unisex', services: ['VIP Facial', 'Couple Massage'],
            status: 'available',
            beds: [
                { id: 'R05-B1', name: 'Giường VIP 1', type: 'vip', status: 'available', customer: null },
                { id: 'R05-B2', name: 'Giường VIP 2', type: 'vip', status: 'available', customer: null }
            ]
        },
        {
            id: 'R06', name: 'Phòng 06', floor: 2, type: 'Deluxe',
            gender: 'female', services: ['Facial', 'LED Therapy'],
            status: 'occupied',
            beds: [
                { id: 'R06-B1', name: 'Giường A', type: 'deluxe', status: 'occupied', customer: 'Phạm Thu Hương', service: 'Lava Facial', until: '11:00' },
                { id: 'R06-B2', name: 'Giường B', type: 'deluxe', status: 'available', customer: null }
            ]
        },
        {
            id: 'R07', name: 'Phòng 07', floor: 3, type: 'Standard',
            gender: 'unisex', services: ['Massage', 'Facial'],
            status: 'cleaning',
            beds: [
                { id: 'R07-B1', name: 'Giường A', type: 'standard', status: 'cleaning', customer: null },
                { id: 'R07-B2', name: 'Giường B', type: 'standard', status: 'cleaning', customer: null }
            ]
        },
        {
            id: 'R08', name: 'Phòng 08', floor: 3, type: 'Deluxe',
            gender: 'male', services: ['Deep Tissue', 'Body Scrub'],
            status: 'available',
            beds: [
                { id: 'R08-B1', name: 'Giường A', type: 'deluxe', status: 'available', customer: null },
                { id: 'R08-B2', name: 'Giường B', type: 'deluxe', status: 'available', customer: null }
            ]
        }
    ];

    let activeBed = null;
    let currentFilter = 'all';

    // ─── RENDER ───────────────────────────────────────────────────
    function renderRooms() {
        const grid = document.getElementById('room-grid');
        grid.innerHTML = '';
        rooms.forEach(r => {
            grid.appendChild(buildRoomCard(r));
        });
        lucide.createIcons();
        updateStats();
    }

    function genderLabel(g) {
        if (g === 'female') return '<span class="bg-pink-50 text-pink-600 text-xs px-2 py-0.5 rounded-full flex items-center gap-1"><i data-lucide="user" class="w-3 h-3"></i>Nữ</span>';
        if (g === 'male')   return '<span class="bg-blue-50 text-blue-600 text-xs px-2 py-0.5 rounded-full flex items-center gap-1"><i data-lucide="user" class="w-3 h-3"></i>Nam</span>';
        return '<span class="bg-purple-50 text-purple-600 text-xs px-2 py-0.5 rounded-full flex items-center gap-1"><i data-lucide="users" class="w-3 h-3"></i>Nam/Nữ</span>';
    }

    function statusLabel(s) {
        const map = { available: ['badge-available','Trống'], occupied: ['badge-occupied','Đang dùng'], cleaning: ['badge-cleaning','Đang dọn'], maintenance: ['badge-maintenance','Bảo trì'] };
        const [cls, txt] = map[s] || map.maintenance;
        return `<span class="${cls} text-xs px-3 py-1 rounded-full font-medium">${txt}</span>`;
    }

    function bedStatusClass(s) {
        return { available: 'bed-available', occupied: 'bed-occupied', cleaning: 'bed-cleaning', maintenance: 'bed-maintenance' }[s] || 'bed-maintenance';
    }

    function bedEmoji(type) {
        return { standard: '🛏', deluxe: '🛁', vip: '✨', couple: '💑' }[type] || '🛏';
    }

    function buildRoomCard(r) {
        const freeBeds = r.beds.filter(b => b.status === 'available').length;
        const totalBeds = r.beds.length;

        const card = document.createElement('div');
        card.className = `room-card bg-white rounded-2xl border-2 room-${r.status} overflow-hidden shadow-soft`;
        card.dataset.status = r.status;
        card.dataset.gender = r.gender;
        card.dataset.name = r.name.toLowerCase();

        // Build bed cells HTML
        const bedCells = r.beds.map(b => `
            <div class="bed-cell ${bedStatusClass(b.status)}" onclick="openBedModal('${r.id}','${b.id}')" title="${b.name}">
                <span class="bed-icon">${bedEmoji(b.type)}</span>
                <span class="font-medium" style="font-size:9px">${b.name.replace('Giường ','')}</span>
                ${b.customer ? `<div style="position:absolute;top:-4px;right:-4px;width:10px;height:10px;background:#ef4444;border-radius:50%;border:1.5px solid white;"></div>` : ''}
            </div>
        `).join('');

        // Current occupants
        const occupants = r.beds.filter(b => b.status === 'occupied').map(b =>
            `<div class="flex items-center justify-between text-xs py-1 border-b border-brand-cream/50 last:border-0">
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-red-400 flex-shrink-0"></span>
                    <span class="font-medium">${b.customer}</span>
                    <span class="text-brand-textmuted">·</span>
                    <span class="text-brand-textmuted">${b.service}</span>
                </div>
                <span class="text-brand-textmuted flex-shrink-0">xong ${b.until}</span>
            </div>`
        ).join('') || `<p class="text-xs text-green-600 italic">Không có khách đang phục vụ</p>`;

        const cleaningBanner = r.status === 'cleaning' ? `
            <div class="mx-4 mb-3 bg-yellow-50 rounded-xl px-3 py-2 flex items-center gap-2">
                <i data-lucide="sparkles" class="w-4 h-4 text-yellow-600 flex-shrink-0"></i>
                <div>
                    <p class="text-xs font-medium text-yellow-700">Đang dọn vệ sinh</p>
                    <p class="text-xs text-yellow-600">Dự kiến xong: 10:25</p>
                </div>
                <button onclick="markRoomClean('${r.id}')" class="ml-auto text-xs bg-yellow-200 hover:bg-yellow-300 text-yellow-800 px-2 py-1 rounded-lg transition">Xong ✓</button>
            </div>` : '';

        card.innerHTML = `
            <!-- Top color bar -->
            <div class="h-2 ${r.status==='available'?'bg-gradient-to-r from-green-400 to-emerald-400': r.status==='occupied'?'bg-gradient-to-r from-red-400 to-rose-400': r.status==='cleaning'?'bg-gradient-to-r from-yellow-400 to-amber-400':'bg-gradient-to-r from-gray-300 to-gray-400'}"></div>

            <div class="p-4">
                <!-- Header row -->
                <div class="flex items-start justify-between mb-3">
                    <div>
                        <h3 class="font-serif text-lg">${r.name}</h3>
                        <p class="text-xs text-brand-textmuted mt-0.5">Tầng ${r.floor} · ${r.type}</p>
                    </div>
                    <div class="flex flex-col items-end gap-1.5">
                        ${statusLabel(r.status)}
                        <div class="flex items-center gap-1">
                            ${genderLabel(r.gender)}
                        </div>
                    </div>
                </div>

                <!-- Services -->
                <div class="flex flex-wrap gap-1 mb-3">
                    ${r.services.map(s=>`<span class="bg-brand-cream text-brand-textmuted text-xs px-2 py-0.5 rounded-lg">${s}</span>`).join('')}
                </div>

                <!-- Bed summary bar -->
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-medium text-brand-textmuted uppercase tracking-wide">Giường (${freeBeds}/${totalBeds} trống)</span>
                    <button onclick="openRoomConfig('${r.id}')" class="text-xs text-brand-gold hover:underline flex items-center gap-0.5">
                        <i data-lucide="settings" class="w-3 h-3"></i> Cấu hình
                    </button>
                </div>

                <!-- Bed cells row -->
                <div class="flex gap-2 mb-3 flex-wrap">
                    ${bedCells}
                    <button onclick="addBed('${r.id}')" class="bed-cell" style="border:1.5px dashed #D9B8B5; background:transparent; color:#8B837C;">
                        <span class="bed-icon">+</span>
                        <span style="font-size:9px">Thêm</span>
                    </button>
                </div>

                <!-- Legend mini -->
                <div class="flex gap-3 mb-3 text-xs text-brand-textmuted">
                    <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded bg-green-200 border border-green-400"></span>Trống</div>
                    <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded bg-red-200 border border-red-400"></span>Có khách</div>
                    <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded bg-yellow-200 border border-yellow-400"></span>Đang dọn</div>
                </div>
            </div>

            ${cleaningBanner}

            <!-- Occupants -->
            <div class="px-4 pb-3">
                <p class="text-xs text-brand-textmuted uppercase tracking-wide mb-1.5">Khách Đang Phục Vụ</p>
                ${occupants}
            </div>

            <!-- Actions -->
            <div class="px-4 pb-4 flex gap-2 mt-1">
                <a href="../booking/tao-booking.html?room=${r.id}" class="flex-1 text-center text-xs ${r.status==='available'?'bg-brand-gold hover:bg-brand-goldhover text-white':'bg-brand-cream text-brand-textmuted cursor-not-allowed opacity-60'} py-2 rounded-xl transition">
                    ${r.status==='available'?'Đặt Ngay':'Không khả dụng'}
                </a>
                <a href="lich-phong.html" class="flex-1 text-center text-xs border border-brand-cream text-brand-textmuted py-2 rounded-xl hover:border-brand-gold hover:text-brand-gold transition">
                    Xem Lịch
                </a>
            </div>
        `;
        return card;
    }

    // ─── BED MODAL ────────────────────────────────────────────────
    function openBedModal(roomId, bedId) {
        const room = rooms.find(r => r.id === roomId);
        const bed  = room.beds.find(b => b.id === bedId);
        activeBed = { room, bed };

        document.getElementById('bed-modal-title').textContent = `${room.name} – ${bed.name}`;

        const statusColors = {
            available:   'text-green-600 bg-green-50',
            occupied:    'text-red-600 bg-red-50',
            cleaning:    'text-yellow-600 bg-yellow-50',
            maintenance: 'text-gray-500 bg-gray-50'
        };
        const statusText = { available:'Trống', occupied:'Có khách', cleaning:'Đang dọn', maintenance:'Bảo trì' };
        const typeLabels = { standard:'Standard', deluxe:'Deluxe', vip:'VIP Suite', couple:'Couple' };

        document.getElementById('bed-modal-body').innerHTML = `
            <div class="flex items-center gap-4 mb-5">
                <div class="w-16 h-16 rounded-2xl ${statusColors[bed.status]} flex items-center justify-center text-3xl">
                    ${bedEmoji(bed.type)}
                </div>
                <div>
                    <p class="font-serif text-xl">${bed.name}</p>
                    <p class="text-xs text-brand-textmuted">${room.name} · ${typeLabels[bed.type] || 'Standard'}</p>
                    <span class="${statusColors[bed.status]} text-xs px-2.5 py-0.5 rounded-full mt-1 inline-block font-medium">${statusText[bed.status]}</span>
                </div>
            </div>

            ${bed.status === 'occupied' ? `
            <div class="bg-red-50 rounded-xl p-4 mb-4">
                <p class="text-xs text-brand-textmuted mb-1">Đang phục vụ:</p>
                <p class="font-medium text-sm">${bed.customer}</p>
                <p class="text-xs text-red-600">${bed.service || ''}</p>
                ${bed.until ? `<p class="text-xs text-brand-textmuted mt-1">Dự kiến xong: <strong>${bed.until}</strong></p>` : ''}
            </div>` : `
            <div class="bg-green-50 rounded-xl p-4 mb-4">
                <p class="text-xs text-green-700 flex items-center gap-1.5">
                    <i data-lucide="check-circle" class="w-4 h-4"></i>
                    Giường sẵn sàng phục vụ
                </p>
            </div>`}

            <p class="text-xs text-brand-textmuted mb-2 font-medium uppercase tracking-wide">Đổi trạng thái thành:</p>
            <div class="grid grid-cols-2 gap-2" id="bed-status-options">
                ${['available','occupied','cleaning','maintenance'].map(s => `
                    <button onclick="selectBedStatus('${s}')" class="bed-status-opt p-2.5 rounded-xl border-2 text-sm text-left transition
                        ${bed.status === s ? 'border-brand-gold bg-brand-gold/10' : 'border-brand-cream hover:border-brand-gold/50'}"
                        data-val="${s}">
                        ${{ available:'✅ Trống', occupied:'🔴 Có khách', cleaning:'🧹 Đang dọn', maintenance:'🔧 Bảo trì'}[s]}
                    </button>
                `).join('')}
            </div>
        `;

        lucide.createIcons();
        document.getElementById('bed-modal').classList.add('open');
    }

    function selectBedStatus(s) {
        document.querySelectorAll('.bed-status-opt').forEach(b => {
            b.classList.remove('border-brand-gold','bg-brand-gold/10');
            b.classList.add('border-brand-cream');
        });
        const btn = document.querySelector(`.bed-status-opt[data-val="${s}"]`);
        if (btn) { btn.classList.add('border-brand-gold','bg-brand-gold/10'); btn.classList.remove('border-brand-cream'); }
        document.getElementById('bed-action-btn').dataset.newStatus = s;
    }

    function changeBedStatus() {
        if (!activeBed) return;
        const btn = document.getElementById('bed-action-btn');
        const newStatus = btn.dataset.newStatus;
        if (!newStatus || newStatus === activeBed.bed.status) { closeBedModal(); return; }
        activeBed.bed.status = newStatus;
        if (newStatus !== 'occupied') { activeBed.bed.customer = null; activeBed.bed.service = null; }
        // Update room status based on beds
        const r = activeBed.room;
        const anyOcc  = r.beds.some(b => b.status === 'occupied');
        const allClean = r.beds.every(b => b.status === 'cleaning');
        r.status = anyOcc ? 'occupied' : allClean ? 'cleaning' : 'available';
        closeBedModal();
        renderRooms();
    }

    function closeBedModal() {
        document.getElementById('bed-modal').classList.remove('open');
        activeBed = null;
    }

    // ─── ROOM CONFIG MODAL ────────────────────────────────────────
    function openRoomConfig(roomId) {
        const room = rooms.find(r => r.id === roomId);
        document.getElementById('room-config-title').textContent = `Cấu Hình ${room.name}`;

        document.getElementById('room-config-body').innerHTML = `
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-brand-textmuted uppercase tracking-wide mb-1.5">Tên Phòng</label>
                        <input type="text" value="${room.name}" class="w-full border border-brand-cream rounded-xl px-3 py-2 text-sm outline-none focus:border-brand-gold">
                    </div>
                    <div>
                        <label class="block text-xs text-brand-textmuted uppercase tracking-wide mb-1.5">Loại Phòng</label>
                        <select class="w-full border border-brand-cream rounded-xl px-3 py-2 text-sm outline-none focus:border-brand-gold">
                            <option ${room.type==='Standard'?'selected':''}>Standard</option>
                            <option ${room.type==='Deluxe'?'selected':''}>Deluxe</option>
                            <option ${room.type==='VIP'?'selected':''}>VIP</option>
                        </select>
                    </div>
                </div>

                <!-- Beds management -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <label class="text-xs text-brand-textmuted uppercase tracking-wide font-medium">Giường (${room.beds.length} giường)</label>
                        <button onclick="addBed('${room.id}')" class="text-xs text-brand-gold hover:underline flex items-center gap-1">
                            <i data-lucide="plus" class="w-3 h-3"></i> Thêm giường
                        </button>
                    </div>
                    <div class="space-y-2" id="bed-config-list">
                        ${room.beds.map((b, idx) => `
                        <div class="flex items-center gap-3 p-3 bg-brand-ivory rounded-xl" data-bed-idx="${idx}">
                            <span class="text-lg">${bedEmoji(b.type)}</span>
                            <input type="text" value="${b.name}" class="flex-1 border border-brand-cream rounded-lg px-2 py-1.5 text-sm outline-none focus:border-brand-gold bg-white" placeholder="Tên giường">
                            <select class="border border-brand-cream rounded-lg px-2 py-1.5 text-sm outline-none focus:border-brand-gold bg-white">
                                <option value="standard" ${b.type==='standard'?'selected':''}>Standard</option>
                                <option value="deluxe"   ${b.type==='deluxe'?'selected':''}>Deluxe</option>
                                <option value="vip"      ${b.type==='vip'?'selected':''}>VIP</option>
                                <option value="couple"   ${b.type==='couple'?'selected':''}>Couple</option>
                            </select>
                            <button onclick="removeBedFromConfig(this)" class="p-1 rounded-lg hover:bg-red-50 hover:text-red-500 transition text-brand-textmuted">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>`).join('')}
                    </div>
                </div>

                <!-- Gender -->
                <div>
                    <label class="block text-xs text-brand-textmuted uppercase tracking-wide mb-2">Phân Loại Giới Tính</label>
                    <div class="flex gap-2">
                        <button class="flex-1 py-2 rounded-xl border-2 text-sm transition ${room.gender==='female'?'border-pink-400 bg-pink-50 text-pink-600':'border-brand-cream text-brand-textmuted'}" onclick="selectGenderConfig(this,'female')">Nữ</button>
                        <button class="flex-1 py-2 rounded-xl border-2 text-sm transition ${room.gender==='male'?'border-blue-400 bg-blue-50 text-blue-600':'border-brand-cream text-brand-textmuted'}" onclick="selectGenderConfig(this,'male')">Nam</button>
                        <button class="flex-1 py-2 rounded-xl border-2 text-sm transition ${room.gender==='unisex'?'border-purple-400 bg-purple-50 text-purple-600':'border-brand-cream text-brand-textmuted'}" onclick="selectGenderConfig(this,'unisex')">Nam/Nữ</button>
                    </div>
                </div>

                <!-- Cleaning time -->
                <div>
                    <label class="block text-xs text-brand-textmuted uppercase tracking-wide mb-1.5">Thời Gian Dọn Dẹp (phút)</label>
                    <input type="number" value="15" min="5" max="60" class="w-full border border-brand-cream rounded-xl px-3 py-2 text-sm outline-none focus:border-brand-gold">
                    <p class="text-xs text-brand-textmuted mt-1">Phòng/giường sẽ bị khoá trong thời gian này giữa các lượt khách</p>
                </div>
            </div>
        `;
        lucide.createIcons();
        document.getElementById('room-config-modal').classList.add('open');
    }

    function closeRoomModal() {
        document.getElementById('room-config-modal').classList.remove('open');
    }

    function saveRoomConfig() {
        closeRoomModal();
        alert('Cấu hình phòng đã được lưu!');
    }

    function addBed(roomId) {
        const room = rooms.find(r => r.id === roomId);
        const newIdx = room.beds.length + 1;
        const letters = ['A','B','C','D','E','F'];
        room.beds.push({
            id: `${roomId}-B${newIdx}`,
            name: `Giường ${letters[newIdx-1] || newIdx}`,
            type: 'standard',
            status: 'available',
            customer: null
        });
        if (document.getElementById('room-config-modal').classList.contains('open')) {
            openRoomConfig(roomId);
        } else {
            renderRooms();
        }
    }

    function removeBedFromConfig(btn) {
        btn.closest('[data-bed-idx]').remove();
    }

    function selectGenderConfig(btn, val) {
        btn.parentElement.querySelectorAll('button').forEach(b => {
            b.className = 'flex-1 py-2 rounded-xl border-2 text-sm transition border-brand-cream text-brand-textmuted';
        });
        const colors = { female:'border-pink-400 bg-pink-50 text-pink-600', male:'border-blue-400 bg-blue-50 text-blue-600', unisex:'border-purple-400 bg-purple-50 text-purple-600' };
        btn.className = `flex-1 py-2 rounded-xl border-2 text-sm transition ${colors[val]}`;
    }

    function markRoomClean(roomId) {
        const room = rooms.find(r => r.id === roomId);
        room.status = 'available';
        room.beds.forEach(b => { if (b.status === 'cleaning') b.status = 'available'; });
        renderRooms();
    }

    // ─── FILTERS ─────────────────────────────────────────────────
    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => {
            const isActive = b.dataset.f === f;
            b.className = `filter-btn px-4 py-1.5 rounded-full text-sm border transition ${isActive ? 'border-brand-gold bg-brand-gold/10 text-brand-gold' : 'border-brand-cream text-brand-textmuted hover:border-brand-gold hover:text-brand-gold'}`;
        });
        applyFilters();
    }

    function applyFilters() {
        document.querySelectorAll('.room-card').forEach(card => {
            const statusMatch = currentFilter === 'all' || card.dataset.status === currentFilter;
            card.style.display = statusMatch ? '' : 'none';
        });
    }

    function updateStats() {
        const allBeds = rooms.flatMap(r => r.beds);
        document.getElementById('stat-total').textContent = rooms.length;
        document.getElementById('stat-rooms-free').textContent = rooms.filter(r => r.status === 'available').length;
        document.getElementById('stat-rooms-occ').textContent = rooms.filter(r => r.status === 'occupied').length;
        document.getElementById('stat-beds-total').textContent = allBeds.length;
        document.getElementById('stat-beds-free').textContent = allBeds.filter(b => b.status === 'available').length;
        document.getElementById('stat-beds-occ').textContent = allBeds.filter(b => b.status === 'occupied').length;
    }

    // Close modals on backdrop click
    document.getElementById('bed-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeBedModal(); });
    document.getElementById('room-config-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeRoomModal(); });

    // Init
    renderRooms();
    </script>

    </div><!-- /scroll wrapper -->
    </div><!-- /flex-1 col wrapper -->

    <script src="../shared/sidebar.js"></script>
    <script>AuraSidebar.init({ basePath: '../', active: 'phong' });</script>
</body>
</html>
