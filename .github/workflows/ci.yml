name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────── Frontend (Next.js × 4) ───────────────────────
  frontend:
    name: Frontend lint + typecheck + build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [client-web, branch-admin, org-admin, tenant-admin]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm --filter @kaori/${{ matrix.app }} lint
        working-directory: .
      - run: pnpm --filter @kaori/${{ matrix.app }} typecheck
        working-directory: .
      - run: pnpm --filter @kaori/${{ matrix.app }} build
        working-directory: .

  # ────────────────────────────── Backend Java ──────────────────────────────
  java:
    name: Java services build + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kaori
          POSTGRES_PASSWORD: kaori
          POSTGRES_DB: kaori_test
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U kaori"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew || true
      - name: Build all
        run: ./gradlew build --no-daemon
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports
          path: services/**/build/reports/tests/
          retention-days: 7

  # ──────────────────────────── Backend Python ──────────────────────────────
  python:
    name: AI service lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install Poetry
        run: pipx install poetry==1.8.3
      - name: Install
        run: poetry install --no-interaction
      - name: Lint
        run: poetry run ruff check src
      - name: Test
        run: poetry run pytest -q

  # ────────────────────────────── i18n parity ───────────────────────────────
  i18n:
    name: i18n key parity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Compare locale keys
        run: node tools/i18n-check.mjs

  # ────────────────────────────── Security scan ─────────────────────────────
  security:
    name: Semgrep + dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten
        continue-on-error: true
