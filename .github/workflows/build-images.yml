name: Build & push Docker images

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/kaori

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: auth-service,        kind: java,   service: auth-service }
          - { name: tenant-service,      kind: java,   service: tenant-service }
          - { name: realtime-gateway,    kind: java,   service: realtime-gateway }
          - { name: notification-service,kind: java,   service: notification-service }
          - { name: api-gateway,         kind: java,   service: api-gateway }
          - { name: ai-service,          kind: python, service: ai-service }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.target.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
      - name: Build & push (java)
        if: matrix.target.kind == 'java'
        uses: docker/build-push-action@v6
        with:
          context: services
          file: infra/docker/java-service.Dockerfile
          build-args: SERVICE=${{ matrix.target.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to: type=gha,scope=${{ matrix.target.name }},mode=max
      - name: Build & push (python)
        if: matrix.target.kind == 'python'
        uses: docker/build-push-action@v6
        with:
          context: services/ai-service
          file: infra/docker/python-service.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to: type=gha,scope=${{ matrix.target.name }},mode=max
